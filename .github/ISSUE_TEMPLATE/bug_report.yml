name: Bug Report
description: 报告 Sanjie 的可复现问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请提供可复现信息。不要上传真实个人信息、密钥或生产数据库。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 写出从干净环境到触发问题的步骤。
      placeholder: |
        1. 启动后端
        2. 打开 H5
        3. 点击 ...
        4. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: Windows 11 / Go 1.25 / Node 20 / H5
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      render: shell
