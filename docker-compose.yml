services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${SANJIE_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - app_h5
    restart: unless-stopped

  server:
    build:
      context: ./server
    environment:
      SANJIE_SERVER_ADDR: ":8080"
      SANJIE_DATABASE_DSN: "/data/sanjie.db"
      SANJIE_DEMO_SEED: "true"
    volumes:
      - sanjie-data:/data
    restart: unless-stopped

  app_h5:
    build:
      context: ./app
      args:
        VITE_SANJIE_API_BASE_URL: ""
    restart: unless-stopped

volumes:
  sanjie-data:
